http_port 3128 ssl-bump \
    tls-cert=/etc/squid/bump.crt \
    tls-key=/etc/squid/bump.key

# No disk caching
cache deny all
cache_mem 8 MB
coredump_dir /tmp

# ACLs
acl SSL_ports port 443
acl CONNECT method CONNECT
acl whitelist dstdomain "/etc/squid/whitelist.conf"
acl whitelist_sni ssl::server_name "/etc/squid/whitelist.conf"
acl step1 at_step SslBump1

# Peek at TLS ClientHello to extract SNI, then splice (pass through) or terminate
ssl_bump peek step1
ssl_bump splice whitelist_sni
ssl_bump terminate all

# Allow all CONNECT to port 443 — SNI whitelist enforced in ssl_bump steps above
http_access deny CONNECT !SSL_ports
http_access allow CONNECT

# Allow plain HTTP if domain is whitelisted
http_access allow whitelist

# Deny everything else
http_access deny all

# Log to stdout/stderr for docker logs
access_log stdio:/dev/stdout
cache_log stdio:/dev/stderr
