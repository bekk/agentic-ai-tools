              nøkkelfunksjoner i produktet, spesielt med tanke på
              brukere/tredjeparter, men også avtalemessige forpliktelser.


              **Tjenestenivåavtale** er det samme som 'Service Level Agreement'
              (SLA), som gjerne brukes for formelle avtaler med
              tredjeparter/eksterne. Vanlige mål er *tilgjengelighet*,
              *feilrate* og *responstid*.


              **Tjenestenivåmål** er det samme som 'Service Level Objective'
              (SLO), som er interne mål vi etterstreber for tjenestene våre. Det
              er som regel akkurat samme typer som brukes for tjenestenivåkrav


              **Tjenstenivåindikator** er det samme som 'Service Level
              Indicator' (SLI), som er konkrete metrikker som legges til grunn
              for å si om avtaler brytes eller er innenfor målene. For eksempel
              kan *feilrate* måles i forholdet mellom HTTP-statuskodene 5xx og
              2xx for web-baserte tjenester


