              **Mål for gjennopprettelsestid** også kalt 'Recovery Time
              Objective' (RTO), måler hvor lang tid tjenesten maksimalt kan være
              utilgjengelig før den er oppe igjen. Det er mulig å ha ulike mål
              avhengig av hvilke scenarier som inntreffer. Begrensede
              hardware-problemer kan ha strengere RTO-krav enn en voldsom
              naturkatastrofe.


              **Mål for gjenopprettelsespunkt** også kalt 'Recovery Point
