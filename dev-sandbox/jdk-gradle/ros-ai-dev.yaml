schemaVersion: '5.2'
title: Initiell RoS 2.1 ai-dev (dev-sandbox)
scope: >-
  Denne RoS'en dekker ai-dev — et nedlåst Docker-basert utviklingsmiljø for
  AI-assistert Java/Gradle-utvikling. Verktøyet brukes av én intern utvikler
  (Jørn Ola Birkeland), behandler ingen persondata, og er ikke eksponert
  eksternt. Nettverkstilgang styres via Squid-proxy med whitelist. DEN ER IKKE
  KOMPLETT, men et utgangspunkt for teamet til å gjøre sine egne vurderinger.
