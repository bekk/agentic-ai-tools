    threatActors: [Reckless employee]
    vulnerabilities: [Misconfiguration, Flawed design]
    risk: {probability: 1, consequence: 3200000}
    remainingRisk: {probability: 0.0025, consequence: 3200000}
    actions:
      - ID: cvqIP
        title: Inngå sikkerhetsavtale
        check: Sikkerhetsavtale med underleverandør inngått (relevant ved graderte data)
      - ID: loKe8
        title: Styr kjøp av skytjenester
        check: Anskaffelse av skytjenester inkluderer risikovurdering og kontrollrutiner for bruk/kostnad
      - ID: r5T5c
        title: Kjør funksjonell test
        check: Manuell eller automatisert funksjonell-/regresjonstest gjennomføres ved vesentlige endringer
      - ID: xF6WJ
        title: Styr kjøp av lisenser
        check: Anskaffelse av programvarelisenser inkluderer risikovurdering og brukskontroll
      - ID: OGOuv
        title: Styr bruk av åpen kildekode
        check: Oversikt over åpen kildekode og lisensmodeller finnes
      - ID: 61BHk
        title: Forvalt lisenser
        check: Oversikt over lisensavtaler, fornyelsesdatoer og faktisk bruk er etablert
      - ID: IlcIA
        title: Del planlagte endringer
        check: Planlagte produktendringer gjøres tilgjengelig for konsumenter i god tid
      - ID: SXoak
        title: Inngå avtaler med tredjeparter
